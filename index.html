<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coin Simulator</title>

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 


</head>

<body>
<div class="container">
<h1>Coin Simulator</h1>

<div class="card">
<select id="tipo">
<option value="ingreso">Ingreso</option>
<option value="gasto">Gasto</option>
<option value="deuda">Deuda</option>
</select>

<select id="categoria">
<option value="General">General</option>
<option value="Comida">Comida</option>
<option value="Transporte">Transporte</option>
<option value="Ocio">Ocio</option>
</select>

<input type="number" id="monto" placeholder="Monto">
<input type="number" id="interes" placeholder="Interés %">
<input type="date" id="fecha">

<button onclick="agregar()">Agregar</button>
</div>

<div class="card">
<h3>Movimientos</h3>
<div id="listaMovimientos"></div>
</div>

<div class="card">
<h3>Presupuesto por categoría</h3>
<input type="text" id="catPresupuesto" placeholder="Categoría">
<input type="number" id="limite" placeholder="Límite">
<button onclick="setPresupuesto()">Guardar límite</button>
</div>

<div class="card">
<h3>Gráfica temporal</h3>
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h3>Gráfica categorías</h3>
<canvas id="barChart"></canvas>
</div>

<div class="card">
<h3>Predicción</h3>
<p id="prediccion"></p>
</div>

<p id="alerta" class="alert"></p>

</div>

<script>
let movimientos = JSON.parse(localStorage.getItem('movimientos')) || [];
let presupuestos = JSON.parse(localStorage.getItem('presupuestos')) || {};
let lineChart, barChart;

function guardar(){
 localStorage.setItem('movimientos', JSON.stringify(movimientos));
 localStorage.setItem('presupuestos', JSON.stringify(presupuestos));
}

function eliminarMovimiento(i){
 movimientos.splice(i,1);
 guardar();
 render();
}

function agregar(){
 let tipo = document.getElementById('tipo').value;
 let categoria = document.getElementById('categoria').value;
 let monto = parseFloat(document.getElementById('monto').value);
 let interes = parseFloat(document.getElementById('interes').value) || 0;
 let fecha = document.getElementById('fecha').value;

 if(isNaN(monto) || monto <= 0){
   alert('El monto debe ser mayor a 0');
   return;
 }

 if(!fecha){
   alert('Debes seleccionar una fecha');
   return;
 }

 movimientos.push({tipo, categoria, monto, interes, fecha});

 document.getElementById('monto').value = '';
 document.getElementById('interes').value = '';
 document.getElementById('fecha').value = '';

 guardar();
 render();
}

function setPresupuesto(){
 let cat = document.getElementById('catPresupuesto').value.trim();
 let lim = parseFloat(document.getElementById('limite').value);

 if(cat && !isNaN(lim)){
   presupuestos[cat] = lim;
   guardar();
   render();
 }
}

function render(){

  let desde = document.getElementById('desde')?.value;
  let hasta = document.getElementById('hasta')?.value;

  let filtrados = movimientos.filter(m => {
    if(!desde && !hasta) return true;
    if(desde && m.fecha < desde) return false;
    if(hasta && m.fecha > hasta) return false;
    return true;
  });

  let porFecha = {}, porCat = {}, alertaTxt = "";

  filtrados.forEach(m => {
    let val = m.tipo === 'deuda'
      ? m.monto * Math.pow(1 + m.interes / 100, 3)
      : m.monto;

    let signed = (m.tipo === 'ingreso') ? val : -val;

    porFecha[m.fecha] = (porFecha[m.fecha] || 0) + signed;
    porCat[m.categoria] = (porCat[m.categoria] || 0) + signed;

    if(presupuestos[m.categoria] && Math.abs(porCat[m.categoria]) > presupuestos[m.categoria]){
      alertaTxt = `Excediste ${m.categoria}`;
    }
  });

  document.getElementById('alerta').textContent = alertaTxt;

  // LISTA
  let cont = document.getElementById('listaMovimientos');
  cont.innerHTML = '';

  filtrados.forEach(m => {

    const originalIndex = movimientos.indexOf(m);

    const item = document.createElement('div');
    item.className = 'mov-item ' + (m.tipo === 'ingreso' ? '' : 'usuario');

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = m.tipo.charAt(0).toUpperCase();

    const cuerpo = document.createElement('div');
    cuerpo.className = 'cuerpo';

    const linea1 = document.createElement('div');
    linea1.innerHTML = `<strong>${m.tipo.toUpperCase()}</strong> - ${m.categoria}`;

    const linea2 = document.createElement('div');
    linea2.textContent = `$${m.monto} | ${m.fecha}`;

    const btn = document.createElement('button');
    btn.className = 'delete-btn';
    btn.textContent = 'Eliminar';
    btn.onclick = () => eliminarMovimiento(originalIndex);

    cuerpo.appendChild(linea1);
    cuerpo.appendChild(linea2);
    cuerpo.appendChild(btn);

    item.appendChild(avatar);
    item.appendChild(cuerpo);
    cont.appendChild(item);
  });

  activarHover();

  // DATOS ORDENADOS
  let fechas = Object.keys(porFecha).sort((a,b)=> new Date(a)-new Date(b));
  let valores = fechas.map(f => porFecha[f]);


if(fechas.length === 0){
  if(lineChart) lineChart.destroy();
  if(barChart) barChart.destroy();
  document.getElementById('prediccion').textContent = 'Sin datos';
  return;
}
 <div class="card">
  <h3>Filtro por fecha</h3>
  <input type="date" id="desde">
  <input type="date" id="hasta">
  <button onclick="render()">Aplicar filtro</button>
</div>
  try{

    if(lineChart) lineChart.destroy();

    lineChart = new Chart(lineChartEl,{
      type:'line',
      data:{
       labels: fechas.map(f => new Date(f).toLocaleDateString()),
        datasets:[{
          data: valores,
          borderColor:'#00c853',
          segment:{
            borderColor: ctx => ctx.p1.parsed.y >= 0 ? '#00c853' : '#ff5252'
          },
          tension:0.3
        }]
      }
    });

    if(barChart) barChart.destroy();

    const cats = Object.keys(porCat);
    const vals = Object.values(porCat);

    barChart = new Chart(barChartEl,{
      type:'bar',
      data:{
        labels: cats,
        datasets:[{
          data: vals,
          backgroundColor: vals.map(v => v >= 0 ? '#00c853' : '#ff5252')
        }]
      }
    });

  }catch(e){
    console.error('Charts rotos:', e);
  }

  prediccion(valores);
}
function activarHover(){
  const mensajes = document.querySelectorAll('#listaMovimientos .mov-item');

  mensajes.forEach(mensaje => {
    mensaje.addEventListener('mouseenter', () => {
      mensajes.forEach(m => {
        if (m === mensaje) {
          m.style.transform = 'scale(1.05)';
          m.style.transition = 'transform 0.25s ease';
          m.style.zIndex = 10;
        } else {
          m.style.transform = 'scale(0.95)';
          m.style.transition = 'transform 0.25s ease';
          m.style.opacity = 0.6;
        }
      });
    });

    mensaje.addEventListener('mouseleave', () => {
      mensajes.forEach(m => {
        m.style.transform = 'scale(1)';
        m.style.opacity = 1;
        m.style.zIndex = 1;
      });
    });
  });
}

function prediccion(vals){
 if(vals.length < 2) return;

 let cambios = [];
 for(let i=1;i<vals.length;i++){
   cambios.push(vals[i]-vals[i-1]);
 }

 let tendencia = cambios.reduce((a,b)=>a+b,0)/cambios.length;
 let futuro = vals[vals.length-1] + tendencia;

 document.getElementById('prediccion').textContent =
   `Tendencia estimada: $${futuro.toFixed(2)}`;
}

const lineChartEl = document.getElementById('lineChart');
const barChartEl = document.getElementById('barChart');

if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js')
   .then(()=>console.log('SW activo'))
   .catch(e=>console.warn('SW error:', e));
}

render();
</script>

</body>
</html>
